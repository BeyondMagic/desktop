# Sync the environment so dinit knows where the display is
exec-once = nu --login -c "source ~/.config/nushell/login.nu"
exec-once = dbus-update-activation-environment --all

exec-once = pkill --full --exact /usr/lib/xdg-desktop-portal

exec-once = sleep 1.25s && hyprpm reload
exec-once = sleep 2.00s && hyprctl reload
exec-once = sleep 10s && dinitctl start fcitx5
exec-once = sleep 5.25s && dinitctl start xdg-desktop-portal
exec-once = sleep 2.00s && dinitctl start xdg-desktop-portal-hyprland
exec-once = sleep 1.50s && dinitctl start awww-daemon
exec-once = sleep 1.50s && dinitctl start nm-applet
exec-once = sleep 2.50s && dinitctl start polkit-gnome-agent
exec-once = sleep 1.50s && dinitctl start gammastep
exec-once = sleep 1.50s && dinitctl start blueman-applet
exec-once = sleep 1.50s && dinitctl start cliphist
exec-once = sleep 1.50s && dinitctl start ags
exec-once = sleep 1.50s && dinitctl start thunderbird
exec-once = sleep 1.50s && dinitctl start flameshot
exec-once = sleep 2.50s && dinitctl start beeper
exec-once = sleep 2.25s && dinitctl start rclone-daemon
